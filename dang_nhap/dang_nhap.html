<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Haha Airlines - Đăng nhập</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="dang_nhap.css">

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">
        <h2>✈ Haha Airlines</h2>
    </div>

    <ul class="menu">

        <li>🌍 Khám Phá</li>
        <li>🎫 Mua Vé</li>
        <li>🛎 Dịch vụ hỗ trợ</li>
        <li>🧭 Hành trình</li>
        <li>✈ Trải nghiệm bay</li>
        <li>👑 FlyPoint</li>
        <li>❓ Trợ giúp</li>

    </ul>

    <div class="member">

        <h4>FlyPoint Rewards</h4>

        <button class="btn-login">
            Đăng nhập
        </button>

        <button class="btn-register">
            Đăng ký
        </button>

    </div>

</div>


<!-- MAIN -->

<div class="main">

<div class="topbar">

<input
type="text"
placeholder="Tìm kiếm">

<button>
VI
</button>

</div>


<div class="container-area">

<div class="login-box">

<h1>Đăng nhập</h1>

<p>
Đăng nhập để tiếp tục sử dụng Haha Airlines
</p>

<div class="mb-3">

<label class="form-label">
Tên tài khoản
</label>

<input
id="username"
type="text"
class="form-control"
placeholder="Nhập tên tài khoản">

</div>


<div class="mb-3">

<label class="form-label">
Mật khẩu
</label>

<input
id="password"
type="password"
class="form-control"
placeholder="Nhập mật khẩu">

</div>

<div class="remember">

<div>

<input type="checkbox">

Ghi nhớ

</div>

<a href="#">
Quên mật khẩu?
</a>

</div>


<button
class="loginButton"
onclick="login()">

Đăng nhập

</button>

<div class="register-text">

Chưa có tài khoản?

<a href="register.html">

Đăng ký ngay

</a>

</div>

</div>

</div>

</div>

<script>

function login(){

let username=
document.getElementById("username").value;

let password=
document.getElementById("password").value;


let user=
JSON.parse(
localStorage.getItem("user")
);


if(
user &&
username===user.username &&
password===user.password
){

alert("Đăng nhập thành công");

}
else{

alert("Sai tài khoản hoặc mật khẩu");

}

}

</script>

</body>
</html>
